<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-LMS SDT Based Platform</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/styles.css">
    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
</head>
<body class="bg-light">
    <!-- Landing / Login Page wrapper -->
    <div class="landing-bg">
        <div class="container px-3 px-sm-4" id="app-container">
            <div class="row justify-content-center align-items-center">
                <div class="col-12 col-sm-10 col-md-8 col-lg-5 text-center mt-3 mt-md-0">
                    
                    <!-- Fun Welcome Header -->
                    <div class="mb-3 mb-md-4">
                        <div class="d-inline-flex justify-content-center align-items-center bg-white rounded-circle shadow-sm mb-3" style="width: 80px; height: 80px; width: clamp(80px, 15vw, 100px); height: clamp(80px, 15vw, 100px);">
                            <img src="https://cdn-icons-png.flaticon.com/512/3048/3048505.png" alt="Mascot Logo" class="opacity-75" style="width: 60%; height: auto;">
                        </div>
                        <h1 class="display-3 fw-bold text-white mb-1" style="text-shadow: 0 4px 0 rgba(0,0,0,0.1); font-size: clamp(3rem, 10vw, 4.5rem);">E-LMS</h1>
                        <p class="h4 text-white fw-bold mb-3 mb-md-4" style="text-shadow: 0 2px 0 rgba(0,0,0,0.1); font-size: clamp(1.2rem, 4vw, 1.5rem);">Your Fun Learning Adventure Begins! 🌟</p>
                    </div>

                    <div id="auth-section" class="mt-2 mt-md-4 w-100 mx-auto">
                        <!-- Login Form placeholder -->
                        <div class="spinner-border text-white" role="status"></div>
                        <p class="text-white mt-2 fw-bold">Loading awesomeness...</p>
                    </div>
                    
                </div>
            </div>
        </div>
    </div>

    <!-- Forgot Password Modal -->
    <div class="modal fade" id="forgotPasswordModal" tabindex="-1" aria-labelledby="forgotPasswordModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content rounded-4 border-0 shadow-lg">
                <div class="modal-header border-bottom-0 pb-0">
                    <h5 class="modal-title fw-bold text-dark" id="forgotPasswordModalLabel">Reset password</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body pt-3 pb-4">
                    <p class="text-muted small">Enter the email address associated with your account, and we will send you a secure link to reset your password.</p>
                    <form id="reset-password-form">
                        <div class="mb-3">
                            <input type="email" class="form-control" id="reset-email" placeholder="student@school.edu" required>
                        </div>
                        <div id="reset-msg" class="small mb-3"></div>

                        <button type="submit" class="btn btn-primary w-100 rounded-pill shadow-sm" id="submit-reset-btn">
                            Send Reset Link
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- App Scripts -->
    <script type="module" src="js/firebase-config.js"></script>
    <script type="module" src="js/auth.js"></script>
    <script type="module" src="js/app.js"></script>
</body>
</html>
